<!DOCTYPE html>
<html lang="es-CO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tablas de Bootstrap</title>

    <link rel="shortcut icon" href="assets/img/fotonat.jpeg" type="image/x-icon">

    <!-- SEO Tags -->
    <meta name="author" content="Natalia Peña Suarez">
    <meta name="description" content="Curriculum Vitae de Natalia Peña Suarez, estudiante de desarrollo de software">
    <meta name="keywords" content="curriculum, desarrollo web, software, HTML, CSS">

    <!-- Optimization -->
    <meta name="theme-color" content="#000000">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="assets/css/styles.css">

    <!--Bootstrap CSS CDN-->
    <!--link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"-->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--Bootstrap CSS local-->
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <style>
        /* Fondo general de las cards */
        .card {
            background-color: #1e1e2f;
            color: #ffffff;
            border: none;
        }

        /* Etiquetas */
        .form-label {
            color: #e0e0e0;
        }

        /* Inputs */
        .form-control {
            background-color: #2c2c3e;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus {
            background-color: #2c2c3e;
            border-color: #a855f7;
            box-shadow: 0 0 0 0.2rem rgba(168, 85, 247, 0.25);
            color: #fff;
        }

        /* REGISTRO */
        .card-header.bg-success {
            background-color: #7c3aed !important;
            /* morado elegante */
        }

        .btn-success {
            background-color: #7c3aed;
            border: none;
        }

        .btn-success:hover {
            background-color: #6d28d9;
        }

        /* LOGIN */
        .card-header.bg-info {
            background-color: #14b8a6 !important;
            /* turquesa */
        }

        .btn-info {
            background-color: #14b8a6;
            border: none;
        }

        .btn-info:hover {
            background-color: #0f766e;
        }

        /* checkbox texto */
        .form-check-label {
            color: #ccc;
        }
    </style>

</head>

<body class="bg-dark">

    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-person-circle"></i> Natalia Peña
                </a>
            </div>
        </nav>
    </header>

    <main class="container py-5">

        <h1 class="text-center text-white mb-5">
            Gestión de Usuarios
        </h1>

        <div class="row justify-content-center g-4">

            <!-- REGISTRO -->
            <div class="col-md-6">
                <div class="card shadow rounded-4">

                    <div class="card-header bg-success text-white text-center">
                        <h2>Registro de Usuario Bootstrap</h2>
                    </div>

                    <div class="card-body">

                        <form>

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
                            </div>

                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com">
                            </div>

                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="Ingrese su teléfono">
                            </div>

                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="usuario" placeholder="Nombre de usuario">
                            </div>

                            <div class="mb-3">
                                <label for="contrasena" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="contrasena" placeholder="Contraseña">
                            </div>

                            <div class="mb-3">
                                <label for="fecha" class="form-label">Fecha de nacimiento</label>
                                <input type="date" class="form-control" id="fecha">
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="terminos">
                                <label class="form-check-label" for="terminos">
                                    Acepto los términos y condiciones
                                </label>
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                Registrarse
                            </button>

                        </form>

                    </div>
                </div>
            </div>

            <!-- LOGIN -->
            <div class="col-md-6">
                <div class="card shadow rounded-4">

                    <div class="card-header bg-info text-white text-center">
                        <h2>Inicio de Sesión</h2>
                    </div>

                    <div class="card-body">

                        <form>

                            <div class="mb-3">
                                <label for="correoLogin" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="correoLogin"
                                    placeholder="ejemplo@correo.com">
                            </div>

                            <div class="mb-3">
                                <label for="claveLogin" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="claveLogin"
                                    placeholder="Ingrese su contraseña">
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="recordar">
                                <label class="form-check-label" for="recordar">
                                    Recordarme
                                </label>
                            </div>

                            <button type="submit" class="btn btn-info text-white w-100">
                                Iniciar Sesión
                            </button>

                        </form>

                    </div>
                </div>
            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Natalia Peña Suarez</p>
    </footer>

    <script src="assets/js/bootstrap.bundle.js"></script>

</body>
